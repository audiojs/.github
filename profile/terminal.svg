<svg xmlns="http://www.w3.org/2000/svg" width="280" height="58" viewBox="0 0 280 58" role="img" aria-label="npm i audio">
  <title>npm i audio</title>
  <style>
    text {
      font-family: ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace;
      font-size: 15px;
    }
    @media (prefers-reduced-motion: reduce) {
      .c { opacity: 1 !important; }
      .caret { x: 137px; opacity: 1 !important; }
    }
  </style>
  <rect x="0.5" y="0.5" width="279" height="57" fill="#0d1014" stroke="#262b33"/>
  <text x="20" y="34" fill="#6a6f78">$</text>
  <text fill="#e8e8ea">
    <tspan class="c" x="38" y="34" opacity="0">n<set attributeName="opacity" to="1" begin="0.50s" fill="freeze"/></tspan>
    <tspan class="c" x="47" y="34" opacity="0">p<set attributeName="opacity" to="1" begin="0.59s" fill="freeze"/></tspan>
    <tspan class="c" x="56" y="34" opacity="0">m<set attributeName="opacity" to="1" begin="0.68s" fill="freeze"/></tspan>
    <tspan class="c" x="74" y="34" opacity="0">i<set attributeName="opacity" to="1" begin="0.86s" fill="freeze"/></tspan>
    <tspan class="c" x="92" y="34" opacity="0">a<set attributeName="opacity" to="1" begin="1.04s" fill="freeze"/></tspan>
    <tspan class="c" x="101" y="34" opacity="0">u<set attributeName="opacity" to="1" begin="1.13s" fill="freeze"/></tspan>
    <tspan class="c" x="110" y="34" opacity="0">d<set attributeName="opacity" to="1" begin="1.22s" fill="freeze"/></tspan>
    <tspan class="c" x="119" y="34" opacity="0">i<set attributeName="opacity" to="1" begin="1.31s" fill="freeze"/></tspan>
    <tspan class="c" x="128" y="34" opacity="0">o<set attributeName="opacity" to="1" begin="1.40s" fill="freeze"/></tspan>
  </text>
  <rect class="caret" x="38" y="21" width="7" height="16" fill="#e8e8ea">
    <animate attributeName="x" begin="0.41s" dur="1.08s" calcMode="discrete"
      values="38;47;56;65;74;83;92;101;110;119;128;137" fill="freeze"/>
    <animate attributeName="opacity" values="1;0" dur="1.06s" calcMode="discrete" repeatCount="indefinite"/>
  </rect>
</svg>
